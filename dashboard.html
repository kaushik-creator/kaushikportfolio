<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard — Personal Project · Kaushik</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="tokens.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);transition:background .3s,color .3s;}
a{text-decoration:none;color:inherit}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:1.1rem 3rem;background:var(--nav-bg);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.nav-links{justify-self:center;list-style:none;display:flex;gap:2.25rem;align-items:center;}
.nav-links a{font-family:'Space Mono',monospace;font-size:.78rem;color:var(--text2);font-weight:500;letter-spacing:.1em;text-transform:uppercase;}
.nav-links a:hover{color:var(--text);}
.nav-right{justify-self:end;display:flex;align-items:center;gap:1rem;}
.nav-logo{justify-self:start;font-weight:800;font-size:1.35rem;letter-spacing:-.03em;}
.nav-logo span{font-weight:500;color:var(--text3);}
.avail-badge{display:flex;align-items:center;gap:.45rem;font-size:.7rem;font-family:'Space Mono',monospace;font-weight:500;color:#4ade80;background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.28);padding:.38rem .95rem;border-radius:999px;}
.avail-dot{width:6px;height:6px;border-radius:2px;background:#4ade80;animation:pulse-green 2s ease-in-out infinite;}
@keyframes pulse-green{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.resume-modal[hidden]{display:none;}
.resume-modal{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;padding:2rem;}
.resume-modal-card{width:min(960px,96vw);height:min(86vh,980px);background:var(--bg);border:1px solid var(--border);display:flex;flex-direction:column;}
.resume-modal-head{display:flex;align-items:center;justify-content:space-between;padding:.65rem .9rem;border-bottom:1px solid var(--border);}
.resume-modal-title{font-family:'Space Mono',monospace;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);}
.resume-close{width:34px;height:28px;border:1px solid var(--border);background:var(--bg2);color:var(--text);cursor:pointer;font-size:1rem;line-height:1;}
.resume-frame{flex:1;width:100%;border:0;background:#fff;}
.toggle{width:38px;height:20px;border-radius:0;background:var(--bg2);border:1px solid var(--border);cursor:pointer;position:relative;}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:12px;height:12px;background:var(--text);transition:transform .3s;}
[data-theme="light"] .toggle::after{transform:translateX(18px);}
.music-toggle{
  position:fixed;
  bottom:1.25rem;
  right:1.25rem;
  z-index:200;
  width:46px;
  height:46px;
  padding:0;
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid var(--border);
  border-radius:0;
  background:var(--nav-bg);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  color:var(--text);
  cursor:pointer;
  transition:border-color .2s,transform .15s,background .2s,color .2s;
}
.music-toggle:hover{border-color:var(--text3);transform:translateY(-2px);}
.music-toggle:focus-visible{outline:2px solid var(--text);outline-offset:2px;}
.music-toggle svg{width:20px;height:20px;pointer-events:none;}
.wrap{max-width:1280px;margin:0 auto;padding:5rem 1.25rem 2rem;}
.title{font-size:1.45rem;font-weight:700;margin-bottom:1rem;}
.slider{border:1px solid var(--border);background:var(--bg2);padding:.7rem;}
.stage{position:relative;display:flex;justify-content:center;align-items:center;min-height:68vh;}
.stage img{max-width:100%;max-height:74vh;display:block;object-fit:contain}
.slide-nav{
  position:absolute;top:50%;transform:translateY(-50%);
  width:46px;height:46px;border:1px solid var(--border);background:rgba(0,0,0,.65);
  color:#fff;font-size:1.65rem;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.slide-nav.prev{left:.7rem}
.slide-nav.next{right:.7rem}
.slide-nav:disabled{opacity:.34;cursor:not-allowed}
.meta{display:flex;justify-content:space-between;align-items:center;gap:1rem;margin-top:.75rem;color:var(--text2);font-size:.84rem}
@media(max-width:760px){
  nav{padding:0 1.2rem;}
  .nav-links{display:none;}
  .avail-badge{display:none;}
  .resume-modal{padding:.8rem;}
  .resume-modal-card{height:88vh;}
}
</style>
</head>
<body>
<audio id="bgMusic" loop preload="auto" playsinline autoplay>
  <source src="audio/bittersweet-symphony.mp3?v=20260724" type="audio/mpeg"/>
</audio>
<button type="button" class="music-toggle" id="musicToggle" aria-label="Pause background music" aria-pressed="true" title="Music">
  <svg id="musicIconPause" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
  <svg id="musicIconPlay" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" hidden><path d="M8 5v14l11-7z"/></svg>
</button>
<nav>
  <a href="index.html" class="nav-logo">K<span>.</span></a>
  <ul class="nav-links">
    <li><a href="index.html#about">About</a></li>
    <li><a href="index.html#keywords">Skills</a></li>
    <li><a href="index.html#experience">Experience</a></li>
    <li><a href="index.html#projects">Projects</a></li>
    <li><a href="#" data-resume-trigger>Resume</a></li>
  </ul>
  <div class="nav-right">
    <div class="avail-badge"><span class="avail-dot"></span>Open to work</div>
    <button class="toggle" id="themeToggle" aria-label="Toggle theme"></button>
  </div>
</nav>

<div class="resume-modal" id="resumeModal" hidden aria-hidden="true">
  <div class="resume-modal-card" role="dialog" aria-modal="true" aria-label="Resume preview">
    <div class="resume-modal-head">
      <span class="resume-modal-title">Resume</span>
      <button type="button" class="resume-close" id="resumeCloseBtn" aria-label="Close resume popup">×</button>
    </div>
    <iframe class="resume-frame" src="kaushik-resume-gd.pdf?v=20260719" title="Kaushik Resume"></iframe>
  </div>
</div>
<div class="wrap">
  <h1 class="title">Dashboard</h1>

  <div class="slider">
    <div class="stage">
      <button class="slide-nav prev" id="prevBtn" aria-label="Previous image">‹</button>
      <img id="slideImage" src="dashboard-images/1.jpg" alt="Dashboard template image 1"/>
      <button class="slide-nav next" id="nextBtn" aria-label="Next image">›</button>
    </div>
    <div class="meta">
      <span>Desktop Dron Template</span>
      <span id="slideCount">1 / 55</span>
    </div>
  </div>
</div>

<script>
const html = document.documentElement;
document.getElementById('themeToggle').addEventListener('click', () => {
  html.dataset.theme = html.dataset.theme === 'dark' ? 'light' : 'dark';
});

const images = Array.from({ length: 55 }, (_, i) => `dashboard-images/${i + 1}.jpg`);
let current = 0;

const imgEl = document.getElementById('slideImage');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const countEl = document.getElementById('slideCount');

function renderSlide() {
  imgEl.src = images[current];
  imgEl.alt = `Dashboard template image ${current + 1}`;
  countEl.textContent = `${current + 1} / ${images.length}`;
  prevBtn.disabled = current === 0;
  nextBtn.disabled = current === images.length - 1;
}

prevBtn.addEventListener('click', () => {
  if (current > 0) { current -= 1; renderSlide(); }
});

nextBtn.addEventListener('click', () => {
  if (current < images.length - 1) { current += 1; renderSlide(); }
});

renderSlide();

const resumeModal = document.getElementById('resumeModal');
const resumeCloseBtn = document.getElementById('resumeCloseBtn');
const resumeTriggers = document.querySelectorAll('[data-resume-trigger]');

function openResumeModal(event) {
  event.preventDefault();
  resumeModal.hidden = false;
  resumeModal.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
}

function closeResumeModal() {
  resumeModal.hidden = true;
  resumeModal.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}

resumeTriggers.forEach((trigger) => trigger.addEventListener('click', openResumeModal));
resumeCloseBtn.addEventListener('click', closeResumeModal);
resumeModal.addEventListener('click', (event) => {
  if (event.target === resumeModal) closeResumeModal();
});
document.addEventListener('keydown', (event) => {
  if (event.key === 'Escape' && !resumeModal.hidden) closeResumeModal();
});
</script>
<script src="audio/music.js"></script>
</body>
</html>
